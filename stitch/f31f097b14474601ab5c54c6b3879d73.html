<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Nunito+Sans:wght@300;400;600&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0f172a", // slate-900
                        "card-dark": "#1e293b", // slate-800
                    },
                    fontFamily: {
                        "display": ["Sora", "sans-serif"],
                        "body": ["Nunito Sans", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
        }
        h1, h2, h3, .font-sora {
            font-family: 'Sora', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white dark:bg-background-dark sticky top-0 z-10">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary text-2xl">account_balance_wallet</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold font-sora tracking-tight">Bütçe Takip</h2>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-card-dark transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-card-dark transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
<!-- Empty State Container -->
<div class="max-w-md w-full flex flex-col items-center text-center space-y-8 animate-in fade-in duration-700">
<!-- Large Icon Illustration -->
<div class="relative group">
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-2xl group-hover:bg-primary/30 transition-all duration-500"></div>
<div class="relative w-32 h-32 md:w-40 md:h-40 bg-slate-100 dark:bg-card-dark rounded-3xl flex items-center justify-center shadow-xl border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-primary text-6xl md:text-7xl">wallet</span>
<!-- Small accent circles -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-emerald-500/20 border border-emerald-500/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-emerald-500 text-sm">add</span>
</div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 bg-amber-500/20 border border-amber-500/30 rounded-full"></div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-3">
<h1 class="text-2xl md:text-3xl font-bold font-sora text-slate-900 dark:text-slate-50">
                            Henüz işlem eklemediniz
                        </h1>
<p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed max-w-[320px] mx-auto">
                            İşlemlerinizi takip etmek için ilk işlemi ekleyin
                        </p>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4 w-full">
<button class="flex items-center justify-center gap-3 w-full bg-primary hover:bg-primary/90 text-white font-sora font-semibold py-4 px-8 rounded-2xl transition-all shadow-lg shadow-primary/25 hover:scale-[1.02] active:scale-[0.98]">
<span class="material-symbols-outlined">add_circle</span>
<span>İlk İşlemi Ekle</span>
</button>
<div class="flex items-center justify-center gap-6 mt-4">
<button class="flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors text-sm font-semibold">
<span class="material-symbols-outlined text-lg">file_upload</span>
                                Veri Aktar
                            </button>
<span class="h-4 w-[1px] bg-slate-200 dark:bg-slate-700"></span>
<button class="flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors text-sm font-semibold">
<span class="material-symbols-outlined text-lg">help</span>
                                Nasıl Çalışır?
                            </button>
</div>
</div>
</div>
<!-- Subtle Background Grid for Design Polish -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] dark:opacity-[0.05] z-[-1]" data-alt="Abstract subtle dot pattern grid background" style="background-image: radial-gradient(#135bec 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
</main>
<!-- Bottom Floating Action Button (Optional UI element for mobile feel) -->
<div class="fixed bottom-8 right-8 hidden md:block">
<button class="flex items-center justify-center w-14 h-14 rounded-full bg-primary text-white shadow-2xl hover:bg-primary/90 transition-transform hover:rotate-90">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<!-- Dashboard Footer/Stats Preview (Subtle) -->
<footer class="px-10 py-6 border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-background-dark/50 backdrop-blur-sm">
<div class="max-w-[960px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 dark:text-slate-500 text-xs">
<p>© 2024 Bütçe Takip Sistemi</p>
<div class="flex gap-4">
<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-700"></span> Gelir: 0.00 ₺</span>
<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-700"></span> Gider: 0.00 ₺</span>
</div>
</div>
</footer>
</div>
</div>
</body></html>
